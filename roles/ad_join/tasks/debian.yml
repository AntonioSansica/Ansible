---

- name: Install required packages
  ansible.builtin.apt:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - oddjob
      - oddjob-mkhomedir
    state: present

- name: Enable home directory
  ansible.builtin.command: /bin/bash -c "pam-auth-update --enable mkhomedir"
  register: home_folder
  changed_when: home_folder != ""
